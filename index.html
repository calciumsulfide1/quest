<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>квест</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --container-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #ff3c3c;
            --border-color: #333;
        }

        body {
            font-family: 'Verdana', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        #text {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            min-height: 80px;
            white-space: pre-line;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background: #252525;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: left;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent; /* Убирает синюю рамку на смартфонах */
        }

        button:hover, button:active {
            background: #333;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .wasted { color: #ff3c3c; font-weight: bold; font-size: 1.5rem; text-align: center; }
        .ending { color: #00ffaa; font-weight: bold; font-size: 1.2rem; text-align: center; border: 1px dashed #00ffaa; padding: 15px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>академия резистенс</h1>
    <div id="text">Загрузка...</div>
    <div id="option-buttons" class="buttons"></div>
</div>

<script>
    const textElement = document.getElementById('text');
    const optionButtonsElement = document.getElementById('option-buttons');

    const textNodes = [
        {
            id: 1,
            text: 'Ты стоишь у входа в комнату Сабрины. На тебя несется Дин Винчестер. Твои действия?',
            options: [
                { text: '«отпизжу его!»', nextText: 2 },
                { text: '«убегу»', nextText: 3 },
                { text: '«останусь стоять на месте»', nextText: 4 }
            ]
        },
        {
            id: 2,
            text: 'ты не Картер. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ ЕЩЕ РАЗ', nextText: 1 }]
        },
        {
            id: 3,
            text: 'Ты успешно избежала столкновение с Дином! Вдруг из-за угла вылетает Марселин. «Ты новенькая? Нищета,» — говорит она.',
            options: [
                { text: '«твоя мама мертвая шлюха»', nextText: 5 },
                { text: '«да, новенькая! меня зовут аделина»', nextText: 6 },
                { text: '«я не из нищеебов, ты что-то путаешь»', nextText: 7 }
            ]
        },
        {
            id: 4,
            text: 'Дин выбил тебе мозги вместе с дверью. Тебе никогда не стать Скарлетт Йохансон. WASTED',
            isWasted: true,
  options: [{ text: 'ПОПРОБОВАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 5,
            text: 'Марселин взорвалась. Секретная концовка: комната с огурцами, Ла-Ла Ленд и канон Робин/Нэнси.',
            isEnding: true,
            options: [{ text: 'ЭТО РАЙ (ИГРАТЬ СНОВА)', nextText: 1 }]
        },
        {
            id: 6,
            text: 'Марселин ушла. Куда ты пойдешь дальше?',
            options: [
                { text: 'сад', nextText: 8 },
                { text: 'мусорка', nextText: 9 },
                { text: 'столовая', nextText: 10 }
            ]
        },
        {
            id: 7,
            text: '«Ок,» — отвечает Марселин. Появился Тун Тун Тун Сахур: «Привет! Значит, ты наследница? Пошли за мной!»',
            options: [
                { text: '«нет иди на хуй»', nextText: 11 },
                { text: '«ну го»', nextText: 12 }
            ]
        },
        {
            id: 8,
            text: 'Ты в саду. Там плачет девчонка с черными волосами. Подойдешь?',
            options: [
                { text: 'да', nextText: 13 },
                { text: 'нет', nextText: 14 }
            ]
        },
        {
            id: 9,
            text: 'Мусорка. Из-за бака выходит Эмма: «Что ты тут забыла? Беги, или я тебя убью!»',
            options: [
                { text: '«я директриса вообще-то»', nextText: 18 },
                { text: '«марселин шлюха»', nextText: 19 },
                { text: '«ты шалава какая-то»', nextText: 20 }
            ]
        },
        {
            id: 10,
            text: 'В столовой Аселия слизывает еду с пола. Ты подошла к ней. «Чего тебе?» — рычит она.',
            options: [
                { text: '«что подумает никлаус?»', nextText: 15 },
                { text: '«ты пишешь посты через гпт»', nextText: 16 },
                { text: '«я забираю у тебя права админа»', nextText: 17 }
            ]
        },
        {
            id: 11,
            text: 'Сахур удалил тебя из реальности. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 12,
            text: 'Зря ты доверилась Сахуру... Ты в темнице, кругом жалобы на некомфортное общение. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 13,
            text: 'Это была латентная лесбуха Эда. Ты заразилась лесбиянством. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 14,
            text: 'Ты не стала подходить. Куда дальше?',
            options: [
                { text: 'столовая', nextText: 10 },
                { text: 'мусорка', nextText: 9 }
            ]
        },
        {
            id: 15,
            text: 'Аселия пришлепнула тебя в котлету. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 16,
            text: 'Аселия пришлепнула тебя в котлету. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 17,
            text: 'Аселия лопнула! От нее остался только латекс. Куда теперь?',
            options: [{ text: 'на мусорку', nextText: 9 }]
        },
        {
            id: 18,
            text: 'Вы занялись жестким БДСМ. Концовка счастливая, но не каноничная.',
            isEnding: true,
            options: [{ text: 'ИГРАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 19,
            text: '«Ты права. Ну ладно, иди,» — говорит Эмма. Пора в комнату?',
            options: [{ text: 'газ к себе в комнату', nextText: 21 }]
        },
        {
            id: 20,
            text: 'Эмма тебя убила. WASTED',
            isWasted: true,
            options: [{ text: 'ПОПРОБОВАТЬ СНОВА', nextText: 1 }]
        },
        {
            id: 21,
            text: 'Ты в комнате. Вспомнила описание чата «арабы».
 .. КАНОНИЧНАЯ КОНЦОВКА',
            isEnding: true,
            options: [{ text: 'ПРОЙТИ ЕЩЕ РАЗ', nextText: 1 }]
        }
    ];

    function showTextNode(textNodeId) {
        const textNode = textNodes.find(node => node.id === textNodeId);
        textElement.innerHTML = '';
        
        if (textNode.isWasted) {
            textElement.innerHTML = <div class="wasted">${textNode.text}</div>;
        } else if (textNode.isEnding) {
            textElement.innerHTML = <div class="ending">${textNode.text}</div>;
        } else {
            textElement.innerText = textNode.text;
        }
        
        while (optionButtonsElement.firstChild) {
            optionButtonsElement.removeChild(optionButtonsElement.firstChild);
        }

        textNode.options.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option.text;
            button.onclick = () => showTextNode(option.nextText);
            optionButtonsElement.appendChild(button);
        });
    }

    // Запуск игры
    window.onload = () => showTextNode(1);
</script>
</body>
</html>
